name: Despliegue Automático en Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código desde GitHub
      uses: actions/checkout@v3

    - name: Sincronizar archivos hacia Hetzner vía SFTP
      uses: easingthemes/ssh-deploy@v4.1.10
      with:
        REMOTE_HOST: ${{ secrets.SSH_HOST }}
        REMOTE_USER: ${{ secrets.SSH_USER }}
        REMOTE_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        ARGS: "-rlgoDzvc --delete"
        SOURCE: "/"
        TARGET: "/var/www/html/"
        EXCLUDE: "/.git/, /.github/, /.gitignore, /.vscode/, /Thumbs.db, /desktop.ini, /.DS_Store, /*.log, /Soporte/backups/, /backups/, /config/ultimo_respaldo.txt, /crear_admin.php, /config/mail_config.php, /config/db.php"